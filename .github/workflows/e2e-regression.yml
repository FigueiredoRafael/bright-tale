name: E2E Regression

on:
  pull_request:
    branches: [staging, main, integration/multi-track-pipeline]

jobs:
  e2e-regression:
    name: E2E Regression (s01,s02,s03,s04,s09,s13)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E regression subset
        run: npm run test:e2e:regression
        env:
          CI: true
          PLAYWRIGHT_NO_SERVER: ""
          NEXT_PUBLIC_E2E: "1"
